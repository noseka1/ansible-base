roles:
# Requires RPM package python3-hvac
  - name: ansible-modules-hashivault
    src: https://github.com/TerryHowe/ansible-modules-hashivault.git
    version: 5.4.0

collections:
  - name: kubernetes.core
    source: https://github.com/ansible-collections/kubernetes.core
    version: 6.3.0

  - name: amazon.aws
    source: https://github.com/ansible-collections/amazon.aws
    version: 10.1.1

  - name: ansible.windows
    source: https://github.com/ansible-collections/ansible.windows
    version: 3.2.0

  - name: chocolatey.chocolatey
    source: https://github.com/chocolatey/chocolatey-ansible
    version: 1.5.3

# Requires RPM package python3-pyvmomi
  - name: community.vmware
    source: https://github.com/ansible-collections/community.vmware
    version: 5.7.2

  - name: azure.azcollection
    source: https://github.com/ansible-collections/azure
    version: 3.7.0
