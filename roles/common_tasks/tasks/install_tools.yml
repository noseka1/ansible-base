- name: Install tools
  ansible.builtin.yum:
    name:
      - bind-utils # dig, host
      - bzip2
      - curl
      - gdb
      - git
      - lsof
      - man-db
      - mc
      - net-tools
      - nmap-ncat
      - patch
      - strace
      - tcpdump
      - vim
      - wget
      - setroubleshoot-server # sealert
      - setools-console # sesearch
      - zsh
    state: present
  when: ansible_facts.distribution in [ "RedHat", "Fedora" ]
  become: true

- name: Install tools RHEL7
  ansible.builtin.yum:
    name:
      - policycoreutils-python # semanage
    state: present
  when:
    - ansible_facts.distribution == "RedHat"
    - ansible_facts.distribution_major_version | int <= 7
  become: true

- name: Install tools RHEL8
  ansible.builtin.yum:
    name:
      - jq
      - policycoreutils-python-utils # semanage
      - python3-pygments
      - iotop
      - tmux
      - wireshark-cli
    state: present
  when:
    - ansible_facts.distribution == "RedHat"
    - ansible_facts.distribution_major_version | int == 8
  become: true

- name: Install tools RHEL9
  ansible.builtin.yum:
    name:
      - jq
      - policycoreutils-python-utils # semanage
      - iotop
      - tmux
      - wireshark-cli
    state: present
  when:
    - ansible_facts.distribution == "RedHat"
    - ansible_facts.distribution_major_version | int >= 9
  become: true

- name: Install tools Fedora
  ansible.builtin.yum:
    name:
      - colordiff
      - fzf
      - jq
      - python3-pygments
      - htop
      - iotop
      - ngrep
      - tig
      - tmux
      - wireshark-cli
    state: present
  when: ansible_facts.distribution == "Fedora"
  become: true
