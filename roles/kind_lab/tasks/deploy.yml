- ansible.builtin.import_role:
    name: machine_base
  tags: machine_base

- name: Install kubectl and podman
  ansible.builtin.yum:
    name:
      - openshift-clients
      - podman
    enablerepo: rhocp-4.9-for-rhel-8-x86_64-rpms
  become: true

- name: Download kind {{ kind_version }} binary
  ansible.builtin.get_url:
    url: '{{ kind_url }}'
    dest: /usr/local/bin/kind
    mode: '0755'
  become: true

- name: Check if kind cluster has already been deployed
  block:
    - name: Attempt to get cluster info
      ansible.builtin.command: kubectl cluster-info --context kind-kind
      become: true

  rescue:
    - name: Deploy kind cluster if doesn't exist
      ansible.builtin.command: /usr/local/bin/kind create cluster
      environment:
        KIND_EXPERIMENTAL_PROVIDER: podman
      register: deploy_kind_result
      become: true

    - ansible.builtin.debug:
        var: deploy_kind_result.stderr_lines

- name: Retrieve cluster info
  ansible.builtin.shell: set -o pipefail && kubectl cluster-info --context kind-kind | sed -r "s/\x1B\[([0-9]{1,3}(;[0-9]{1,2})?)?[mGK]//g"
  register: cluster_info_result
  become: true

- ansible.builtin.debug:
    var: cluster_info_result.stdout_lines
