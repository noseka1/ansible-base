- name: Set authorized key for user root
  ansible.posix.authorized_key:
    user: root
    key: '{{ lookup("file", lookup("env", "HOME") + "/.ssh/id_rsa.pub") }}'
  become: true

- name: Set authorized key for user {{ ansible_facts.user_id }}
  ansible.posix.authorized_key:
    user: '{{ ansible_facts.user_id }}'
    key: '{{ lookup("file", lookup("env", "HOME") + "/.ssh/id_rsa.pub") }}'
