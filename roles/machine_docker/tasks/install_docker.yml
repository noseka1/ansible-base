- name: Add Docker repo
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/centos/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo
    mode: '0644'
  become: true

- name: Workaround for installing containerd.io, https://bugzilla.redhat.com/show_bug.cgi?id=1756473
  community.general.ini_file:
    dest: /etc/yum.repos.d/docker-ce.repo
    section: docker-ce-stable
    option: module_hotfixes
    value: "True"
    mode: '0644'
  become: true

- name: Make sure conflicting podman is not installed
  ansible.builtin.yum:
    name:
      - podman
      - podman-docker
      - podman-manpages
    state: absent
  become: true

- name: Install Docker
  ansible.builtin.yum:
    name:
      - docker-ce
      - docker-ce-cli
  become: true

- name: Ensure required directory exists
  ansible.builtin.file:
    dest: /etc/docker
    state: directory
    mode: '0755'
  become: true

- name: Install Docker daemon config
  ansible.builtin.template:
    src: daemon.json
    dest: /etc/docker/daemon.json
    mode: '0644'
  notify: Restart docker
  become: true

- name: Start Docker service
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true
