apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aap-mgmt
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
# Grant aap-mgmt service account cluster-admin privileges
- kind: ServiceAccount
  name: aap-mgmt
  namespace: kube-system
