osclusterinstall_client_archive_url: >-
  https://mirror.openshift.com/pub/openshift-v4/clients/ocp/{{ osclusterinstall_version_resolved }}/openshift-client-linux-{{ osclusterinstall_version_resolved }}.tar.gz
osclusterinstall_client_sha256sum_url: >-
