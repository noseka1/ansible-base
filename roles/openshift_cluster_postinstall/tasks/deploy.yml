- ansible.builtin.import_role:
    name: openshift_common
    tasks_from: wait_for_stable_cluster.yml
  vars:
    stable_cluster_delay: 0
    stable_cluster_retries: 10

- ansible.builtin.import_role:
    name: openshift_common
    tasks_from: get_infrastructure.yml

- ansible.builtin.import_role:
    name: openshift_common
    tasks_from: get_default_ingresscontroller.yml

- ansible.builtin.import_role:
    name: openshift_common
    tasks_from: get_cluster_version.yml

- ansible.builtin.import_role:
    name: openshift_common
    tasks_from: get_provisioning.yml

- ansible.builtin.import_tasks: configure_images_mirrors.yml
  when: osclusterpostinst_image_mirrors[oscommon_cluster_domain] is defined

- ansible.builtin.import_tasks: etcd_encryption.yml
  when:
    - osclusterpostinst_etcd_encryption
    - oscommon_infrastructure.status.controlPlaneTopology not in ['External']

- ansible.builtin.import_tasks: infra_nodes.yml
  when: oscommon_infrastructure.status.platformStatus.type == 'AWS'

- ansible.builtin.import_tasks: cluster_autoscaling.yml
  when: oscommon_infrastructure.status.platformStatus.type in ['AWS', 'Azure', 'GCP']

- ansible.builtin.import_tasks: configure_machine_healthcheck.yml
  when: oscommon_infrastructure.status.platformStatus.type == 'AWS'

- ansible.builtin.import_tasks: autoscale_to_host.yml
  when:
    - oscommon_infrastructure.status.platformStatus.type == 'BareMetal'
    - openshift_common_provisioning_exists

- ansible.builtin.import_tasks: configure_ingresscontroller.yml

- ansible.builtin.import_tasks: configure_network.yml

- ansible.builtin.import_tasks: ensure_storage.yml

- ansible.builtin.import_tasks: clusterwide_proxy.yml
  when: oscommon_infrastructure.status.controlPlaneTopology not in ['External']

- ansible.builtin.import_tasks: rhel_entitlement.yml

- ansible.builtin.import_tasks: install_custom_rpms.yml
  when: osclusterpostinst_install_custom_rpms

- ansible.builtin.import_tasks: custom_kernel_args.yml

- ansible.builtin.import_tasks: configure_kubelet.yml
  when: oscommon_infrastructure.status.controlPlaneTopology not in ['External']

- ansible.builtin.import_tasks: set_core_user_password.yml
  when:
    - osclusterpostinst_set_core_user_password
    - oscommon_cluster_version_majorminor is version('4.13', '>=', strict=true)
    - oscommon_infrastructure.status.controlPlaneTopology not in ['External']

- ansible.builtin.import_tasks: set_root_user_password.yml
  when:
    - osclusterpostinst_set_root_user_password
    - oscommon_infrastructure.status.controlPlaneTopology not in ['External']

- ansible.builtin.import_tasks: enable_fstrim.yml
  when:
    - osclusterpostinst_enable_fstrim
    - oscommon_infrastructure.status.controlPlaneTopology not in ['External']

- ansible.builtin.import_tasks: kube_apiserver_audit.yml
  when: oscommon_infrastructure.status.controlPlaneTopology not in ['External']

- ansible.builtin.import_tasks: rbac.yml

- ansible.builtin.import_tasks: oauth_provider.yml
  when: oscommon_infrastructure.status.controlPlaneTopology not in ['External']

- ansible.builtin.import_tasks: operatorhub_io.yml
  when: osclusterpostinst_enable_operatorhub

- ansible.builtin.import_tasks: image_registry.yml

- ansible.builtin.import_tasks: image_prunning.yml

- ansible.builtin.import_tasks: disable_self_provisioners.yml

- ansible.builtin.import_tasks: monitoring.yml

- ansible.builtin.import_tasks: auto_approve_csr.yml
  when: oscommon_infrastructure.status.controlPlaneTopology not in ['External']

- ansible.builtin.import_tasks: cluster_banner.yml
  when: osclusterpostinst_cluster_banner.enabled

- ansible.builtin.import_tasks: delete_succeeded_pods.yml

- ansible.builtin.import_tasks: endpoint_certs_aws.yml
  when:
    - osclusterpostinst_configure_endpoint_certs
    - oscommon_infrastructure.status.platformStatus.type == 'AWS'

- ansible.builtin.import_tasks: endpoint_certs_azure.yml
  when:
    - osclusterpostinst_configure_endpoint_certs
    - oscommon_infrastructure.status.platformStatus.type == 'Azure'

- ansible.builtin.import_tasks: endpoint_certs_gcp.yml
  when:
    - osclusterpostinst_configure_endpoint_certs
    - oscommon_infrastructure.status.platformStatus.type == 'GCP'

- ansible.builtin.import_tasks: endpoint_certs_private.yml
  when:
    - osclusterpostinst_configure_endpoint_certs
    - oscommon_infrastructure.status.platformStatus.type not in ['AWS', 'Azure', 'GCP']

- ansible.builtin.import_tasks: cluster_info.yml

- ansible.builtin.import_role:
    name: openshift_autogitops
    tasks_from: deploy.yml
  when: osclusterpostinst_deploy_autogitops
