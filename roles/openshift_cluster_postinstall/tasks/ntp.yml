- ansible.builtin.import_role:
    name: openshift_common
    tasks_from: get_machineconfiguration.yml

- ansible.builtin.import_role:
    name: openshift_common
    tasks_from: update_machineconfiguration.yml
  vars:
    openshift_common_mc_update_yaml: '{{ lookup("template", "ntp/cluster-machineconfiguration.yaml") | from_yaml }}'
  when: openshift_common_machineconfiguration_exists

- name: Configure custom NTP servers (may cause nodes to restart)
  kubernetes.core.k8s:
    template: ntp/99-chrony-conf-override-mc.yaml
  register: osclusterpostinst_chrony_machineconfig_result
  loop:
    - worker
    - master

- ansible.builtin.import_role:
    name: openshift_common
    tasks_from: wait_for_stable_cluster.yml
  vars:
    stable_cluster_delay: 120
    stable_cluster_retries: 10
  when:
    - not openshift_common_machineconfiguration_exists
    - osclusterpostinst_chrony_machineconfig_result is changed
