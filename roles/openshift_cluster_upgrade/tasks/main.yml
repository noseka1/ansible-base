- name: Get target version
  ansible.builtin.import_tasks: compute_target_version.yml

- name: Wait for stable cluster
  ansible.builtin.import_role:
    name: openshift_common
    tasks_from: wait_for_stable_cluster.yml
  vars:
    stable_cluster_delay: 0
    stable_cluster_retries: 60

- name: Retrieve current cluster version
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: ClusterVersion
    name: version
  register: openshift_cluster_upgrade_clusterversion_result

- name: Show cluster current version
  ansible.builtin.debug:
    msg: Current cluster version is {{ openshift_cluster_upgrade_clusterversion_result.resources.0.status.desired.version }}

- name: Compute upgrade path to {{ openshift_cluster_upgrade_target_version_resolved }}
  ansible.builtin.script: |-
    files/openshift_upgrade_path.py \
      {{ openshift_cluster_upgrade_clusterversion_result.resources.0.status.desired.version }} \
      {{ openshift_cluster_upgrade_target_channel }} \
      {{ openshift_cluster_upgrade_target_version_resolved }}
  changed_when: false
  register: openshift_cluster_upgrade_path

- name: Show upgrade path
  ansible.builtin.debug:
    var: openshift_cluster_upgrade_path.stdout | from_json

- name: Provide administrator acknowledgment to upgrade
  kubernetes.core.k8s:
    template: admin-acks-cm.yaml

- name: Perform OpenShift cluster upgrade(s)
  ansible.builtin.include_tasks: upgrade.yml
  loop: '{{ openshift_cluster_upgrade_path.stdout | from_json }}'

- name: Retrieve the upgrade history
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: ClusterVersion
    name: version
  register: openshift_cluster_upgrade_clusterversion_result

- name: Show upgrade history
  ansible.builtin.debug:
    var: openshift_cluster_upgrade_clusterversion_result.resources.0.status.history
