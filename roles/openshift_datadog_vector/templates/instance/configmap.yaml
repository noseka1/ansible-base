apiVersion: v1
kind: ConfigMap
metadata:
  name: datadog-vector-instance
  namespace: {{ ddvector_namespace }}
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/instance: datadog-vector-instance
    app.kubernetes.io/component: Stateless-Aggregator
data:
  aggregator.yaml: |
    data_dir: /vector-data-dir
    api:
      enabled: true
      address: 127.0.0.1:8686
      playground: false
    sources:
      datadog_agent:
        address: 0.0.0.0:8282
        type: datadog_agent
      fluent:
        address: 0.0.0.0:24224
        type: fluent
      internal_metrics:
        type: internal_metrics
      logstash:
        address: 0.0.0.0:5044
        type: logstash
      socket_udp:
        address: 0.0.0.0:1520
        mode: udp
        type: socket
      splunk_hec:
        address: 0.0.0.0:8080
        type: splunk_hec
      statsd:
        address: 0.0.0.0:8125
        mode: tcp
        type: statsd
      syslog_udp:
        address: 0.0.0.0:1514
        mode: udp
        type: syslog
      syslog_tcp:
        address: 0.0.0.0:9000
        mode: tcp
        type: syslog
      vector:
        address: 0.0.0.0:6000
        type: vector
        version: '2'
    sinks:
      prom_exporter:
        type: prometheus_exporter
        inputs: [internal_metrics]
        address: 0.0.0.0:9090
      stdout:
        type: console
        inputs: [datadog_agent, fluent, logstash, socket_udp, splunk_hec, statsd, syslog_udp, syslog_tcp, vector]
        encoding:
          codec: json
