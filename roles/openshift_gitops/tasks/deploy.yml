- ansible.builtin.import_tasks: gitops_operator_deploy.yml
  tags: gitops_operator

- ansible.builtin.import_tasks: gitops_instance_deploy.yml
  tags: gitops_instance

- ansible.builtin.import_tasks: gitops_cluster_import.yml
  tags: gitops_cluster_import

- ansible.builtin.import_tasks: gitops_notifications_deploy.yml
  tags: gitops_notifications

- ansible.builtin.import_tasks: argo_rollouts_deploy.yml
  when: gitops_argo_rollouts_enabled
  tags: gitops_argo_rollouts

- ansible.builtin.import_tasks: cloudflare_tunnel_create.yml
  when: gitops_cloudflare_tunnel_create
  tags: gitops_cloudflare_tunnel

- ansible.builtin.import_tasks: report_success.yml
