- import_role:
    name: ansible-modules-hashivault

- import_tasks: connection_addr.yml

- import_tasks: admin_token.yml

- name: Get role id for '{{ hvault_approle_name }}'
  hashivault_approle_role_id:
    name: '{{ hvault_approle_name }}'
  register: hvault_approle_role_id_result
  environment:
    VAULT_ADDR: '{{ hvault_addr }}'
    VAULT_SKIP_VERIFY: '{{ hvault_skip_verify }}'
    VAULT_TOKEN: '{{ hvault_token }}'

- name: Create role secret for '{{ hvault_approle_name }}'
  hashivault_approle_role_secret:
    name: '{{ hvault_approle_name }}'
  environment:
    VAULT_ADDR: '{{ hvault_addr }}'
    VAULT_SKIP_VERIFY: '{{ hvault_skip_verify }}'
    VAULT_TOKEN: '{{ hvault_token }}'
  register: hvault_approle_secret_result

- set_fact:
    hvault_approle_role_id: '{{ hvault_approle_role_id_result.data.role_id }}'
    hvault_approle_secret: '{{ hvault_approle_secret_result.data.secret_id }}'
