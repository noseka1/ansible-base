apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
spec:
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: docker.io/pgsty/minio:RELEASE.2026-03-14T12-00-00Z
        args:
        - server
        - --config-dir=/config
        - --address=:9000
        - --console-address=:8080
        - /storage
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-server-credentials
              key: minio_access_key
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-server-credentials
              key: minio_secret_key
        # Disable metrics endpoint authentication
        # See also https://min.io/docs/minio/linux/reference/minio-server/settings/metrics-and-logging.html#envvar.MINIO_PROMETHEUS_AUTH_TYPE
        - name: MINIO_PROMETHEUS_AUTH_TYPE
          value: public
        - name: MC_DISABLE_PAGER
          value: 'true'
        ports:
        - containerPort: 9000
        - containerPort: 8080
        volumeMounts:
        - name: storage
          mountPath: /storage
        - name: config
          mountPath: /config
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: minio-storage
      - name: config
        persistentVolumeClaim:
          claimName: minio-config
