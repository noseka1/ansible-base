- import_role:
    name: openshift_common
    tasks_from: install_plan_approve
  vars:
    oscomm_subscription_name: multicluster-engine
    oscomm_subscription_namespace: multicluster-engine

- import_role:
    name: openshift_autogitops
    tasks_from: app_deploy.yml
  vars:
    autogitops_app_src_path: templates/operator
    autogitops_app_dst_path: mce/operator
    autogitops_app_namespace: multicluster-engine

- import_role:
    name: openshift_autogitops
    tasks_from: app_deploy.yml
  vars:
    autogitops_app_src_path: templates/instance
    autogitops_app_dst_path: mce/instance
    autogitops_app_namespace: multicluster-engine

- name: Waiting since {{ lookup("pipe", "date +%r") }} for ManagedCluster local-cluster object to become available
  kubernetes.core.k8s_info:
    api_version: cluster.open-cluster-management.io/v1
    kind: ManagedCluster
    name: local-cluster
    wait: true
    wait_condition:
      type: ManagedClusterConditionAvailable
    wait_sleep: 5
    wait_timeout: 800
