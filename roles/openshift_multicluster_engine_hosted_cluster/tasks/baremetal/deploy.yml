- import_role:
    name: openshift_multicluster_engine_infraenv
    tasks_from: infraenv_deploy.yml
  vars:
    mceinfraenv_info: '{{ mcehostedcluster_baremetal }}'
  tags: mcehostedcluster_infraenv

- set_fact:
    mcehostedcluster_info: '{{ mcehostedcluster_baremetal }}'
  tags: mcehostedcluster_instance

- import_tasks: common/namespace_deploy.yml
  tags: mcehostedcluster_instance

- import_role:
    name: openshift_autogitops
    tasks_from: app_deploy.yml
  vars:
    autogitops_app_src_path: templates/baremetal/instance
    autogitops_app_dst_path: mce/hosted-cluster/{{ mcehostedcluster_info.cluster_name }}/instance
    autogitops_app_namespace: '{{ mcehostedcluster_info.cluster_name }}-hosted'
    autogitops_app_sync_retries: 600
  tags: mcehostedcluster_instance

- import_tasks: common/report_success.yml
  tags: mcehostedcluster_instance
