---
{% if mceinfraenv_info.cluster_nodes_shared.bmh.bmc is defined %}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bmc-creds
  namespace: {{ mceinfraenv_info.cluster_name }}-infraenv
spec:
  secretStoreRef:
    name: autogitops
    kind: ClusterSecretStore
  dataFrom:
  - extract:
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      key: '{{ oscommon_cluster_domain }}/mce/infraenv/{{ mceinfraenv_info.cluster_name }}/bmc-creds'
{% endif %}
