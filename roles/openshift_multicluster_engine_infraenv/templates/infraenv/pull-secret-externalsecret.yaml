apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ mceinfraenv_info.cluster_name }}-pull-secret
  namespace: {{ mceinfraenv_info.cluster_name }}-infraenv
spec:
  secretStoreRef:
    name: autogitops
    kind: ClusterSecretStore
  dataFrom:
  - extract:
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      key: '{{ oscommon_cluster_domain }}/mce/infraenv/{{ mceinfraenv_info.cluster_name }}/pull-secret'
  target:
    template:
      type: kubernetes.io/dockerconfigjson
