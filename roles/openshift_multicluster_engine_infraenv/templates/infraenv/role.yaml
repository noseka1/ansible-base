# This role is necessary solely for the installation of the Hosted Control Plane cluster.
# It is not needed for the installation of the managed cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: capi-provider-role
  namespace: {{ mceinfraenv_info.cluster_name }}-infraenv
rules:
- apiGroups:
  - agent-install.openshift.io
  resources:
  - agents
  verbs:
  - '*'
