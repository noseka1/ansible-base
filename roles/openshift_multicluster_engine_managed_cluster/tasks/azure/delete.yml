- ansible.builtin.set_fact:
    mcemanagedcluster_info: '{{ mcemanagedcluster_azure }}'

- ansible.builtin.import_role:
    name: openshift_autogitops
    tasks_from: app_delete.yml
  vars:
    autogitops_app_dst_path: mce/managed-cluster/{{ mcemanagedcluster_info.cluster_name }}

- ansible.builtin.import_role:
    name: openshift_hashicorp_vault
    tasks_from: secret_delete.yml
  vars:
    hvault_mount_point: autogitops
    hvault_secret_name: '{{ oscommon_cluster_domain }}/mce/managed-cluster/{{ mcemanagedcluster_info.cluster_name }}/cloud-creds'

- ansible.builtin.import_role:
    name: openshift_hashicorp_vault
    tasks_from: secret_delete.yml
  vars:
    hvault_mount_point: autogitops
    hvault_secret_name: '{{ oscommon_cluster_domain }}/mce/managed-cluster/{{ mcemanagedcluster_info.cluster_name }}/install-config'

- ansible.builtin.import_role:
    name: openshift_hashicorp_vault
    tasks_from: secret_delete.yml
  vars:
    hvault_mount_point: autogitops
    hvault_secret_name: '{{ oscommon_cluster_domain }}/mce/managed-cluster/{{ mcemanagedcluster_info.cluster_name }}/pull-secret'

- ansible.builtin.import_role:
    name: openshift_hashicorp_vault
    tasks_from: secret_delete.yml
  vars:
    hvault_mount_point: autogitops
    hvault_secret_name: '{{ oscommon_cluster_domain }}/mce/managed-cluster/{{ mcemanagedcluster_info.cluster_name }}/ssh-private-key'
