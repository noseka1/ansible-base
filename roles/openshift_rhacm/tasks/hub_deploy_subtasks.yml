- ansible.builtin.import_role:
    name: openshift_common
    tasks_from: install_plan_approve
  vars:
    oscomm_subscription_name: advanced-cluster-management
    oscomm_subscription_namespace: open-cluster-management

- ansible.builtin.import_role:
    name: openshift_autogitops
    tasks_from: app_deploy.yml
  vars:
    autogitops_app_src_path: templates/operator
    autogitops_app_dst_path: rhacm/operator
    autogitops_app_namespace: open-cluster-management

- ansible.builtin.import_role:
    name: openshift_common
    tasks_from: wait_for_operator.yml
  vars:
    oscomm_subscription_name: advanced-cluster-management
    oscomm_subscription_namespace: open-cluster-management

- name: Retrieve default storage class
  ansible.builtin.import_role:
    name: openshift_common
    tasks_from: get_default_storage_class.yml

- ansible.builtin.import_role:
    name: openshift_common
    tasks_from: install_plan_approve
  vars:
    oscomm_subscription_name: multicluster-engine
    oscomm_subscription_namespace: multicluster-engine

- ansible.builtin.import_role:
    name: openshift_autogitops
    tasks_from: app_deploy.yml
  vars:
    autogitops_app_src_path: templates/instance
    autogitops_app_dst_path: rhacm/instance
    autogitops_app_namespace: open-cluster-management

- name: Wait until managedcluster local-cluster object is available
  kubernetes.core.k8s_info:
    api_version: cluster.open-cluster-management.io/v1
    kind: ManagedCluster
    name: local-cluster
    wait: true
    wait_condition:
      type: ManagedClusterConditionAvailable
    wait_sleep: 10
    wait_timeout: 800
