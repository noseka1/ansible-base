- ansible.builtin.import_tasks: secured_cluster_common_delete.yml

- ansible.builtin.import_tasks: webhook_receiver_delete.yml
  when: rhacs_webhook_receiver_enabled

- ansible.builtin.import_tasks: minio_backup_delete.yml
  when: rhacs_minio_backup_enabled

- ansible.builtin.import_tasks: central_delete.yml

- ansible.builtin.import_role:
    name: openshift_autogitops
    tasks_from: app_delete.yml
  vars:
    autogitops_app_dst_path: rhacs/namespace

- ansible.builtin.import_tasks: operator_delete.yml
