- ansible.builtin.import_tasks: operator_deploy.yml

- ansible.builtin.import_role:
    name: openshift_autogitops
    tasks_from: app_deploy.yml
  vars:
    autogitops_app_src_path: templates/namespace
    autogitops_app_dst_path: rhacs/namespace
    autogitops_app_namespace: stackrox

- ansible.builtin.import_tasks: central_deploy.yml

- ansible.builtin.import_tasks: quay_image_integration_configure.yml
  when: rhacs_quay_image_integration_enabled

- ansible.builtin.import_tasks: webhook_receiver_deploy.yml
  when: rhacs_webhook_receiver_enabled

- ansible.builtin.import_tasks: email_receiver_configure.yml
  when: rhacs_email_receiver_enabled

- ansible.builtin.import_tasks: syslog_receiver_configure.yml
  when: rhacs_syslog_receiver_enabled

- ansible.builtin.import_tasks: slack_receiver_configure.yml
  when: rhacs_slack_receiver_url | length > 0

- ansible.builtin.import_tasks: splunk_receiver_configure.yml
  when: rhacs_splunk_receiver_enabled

- ansible.builtin.import_tasks: minio_backup_deploy.yml
  when: rhacs_minio_backup_enabled

- ansible.builtin.import_tasks: cloudflare_tunnel_create.yml
  when: rhacs_cloudflare_tunnel_create

- ansible.builtin.import_tasks: openshift_sso_configure.yml

- ansible.builtin.import_tasks: secured_cluster_common_deploy.yml

- ansible.builtin.import_tasks: report_success.yml
