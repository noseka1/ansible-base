- ansible.builtin.import_role:
    name: openshift_common
    tasks_from: install_plan_approve
  vars:
    oscomm_subscription_name: security-profiles-operator
    oscomm_subscription_namespace: openshift-security-profiles

- ansible.builtin.import_role:
    name: openshift_autogitops
    tasks_from: app_deploy.yml
  vars:
    autogitops_app_src_path: templates/operator
    autogitops_app_dst_path: security-profiles-operator/operator
    autogitops_app_namespace: openshift-security-profiles

- ansible.builtin.import_role:
    name: openshift_autogitops
    tasks_from: app_deploy.yml
  vars:
    autogitops_app_src_path: templates/instance
    autogitops_app_dst_path: security-profiles-operator/instance
    autogitops_app_namespace: openshift-security-profiles
