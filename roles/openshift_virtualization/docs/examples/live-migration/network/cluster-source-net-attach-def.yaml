apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vm-migration
  namespace: default
spec:
  config: |
    {
      "cniVersion": "0.3.0",
      "name": "vm-migration",
      "type": "macvlan",
      "master": "enp2s0",
      "mode": "bridge",
      "ipam": {
        "type": "whereabouts",
        "range": "192.168.78.0/24",
        "range_start": "192.168.78.20",
        "range_end": "192.168.78.100"
      }
    }
