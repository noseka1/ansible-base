apiVersion: v1
kind: Namespace
metadata:
  labels:
    # Disable KubeMacPool for the target namespace to resolve a "MAC address
    # already allocated" conflict during KubeVirt migration. This prevents
    # the admission webhook from blocking the VM creation when it detects a
    # MAC address that it thinks is already in use—which is common when
    # migrating a VM that already has a statically assigned MAC from its
    # source environment.
    # If you want KubeMacPool to manage new VMs in the namespace later,
    # remove this label.
    mutatevirtualmachines.kubemacpool.io: ignore
  name: kubevirt-migrate-target
