apiVersion: cdi.kubevirt.io/v1beta1
kind: VolumeImportSource
metadata:
  name: example-rootdisk
  namespace: kubevirt-migrate-source
spec:
  source:
    registry:
      url: docker://quay.io/containerdisks/fedora:43
      # Take advantage of the OpenShift pull secret which is required
      # to pull container images from the Red Hat registry.
      pullMethod: node
