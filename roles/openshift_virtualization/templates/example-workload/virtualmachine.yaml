apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: {{ osvirt_machine_name }}
  namespace: {{ osvirt_machine_namespace }}
spec:
  # There are currently five RunStrategies defined:
  # Always, RerunOnFailure, Once, Manual, Halted
  # See the description of the runStrategy options at
  # https://kubevirt.io/user-guide/compute/run_strategies/#runstrategy
  runStrategy: Always
  template:
#    metadata:
#      annotations:
#        # Keep the virt-launcher pod running even if QEMU process exits
#        kubevirt.io/keep-launcher-alive-after-failure: 'true'
#        # Log filter levels are 1: DEBUG, 2: INFO, 3: WARNING, 4: ERROR
#        # 1. logs all messages generated by libvirt.
#        # 2. logs all non-debugging information.
#        # 3. logs all warning and error messages. This is the default value.
#        # 4. logs only error messages.
#        # See also:
#        # https://libvirt.org/kbase/debuglogs.html#logging-settings-in-libvirt
#        # https://docs.redhat.com/en/documentation/red_hat_enterprise_linux/10/html/configuring_and_managing_linux_virtual_machines/diagnosing-virtual-machine-problems
#        kubevirt.io/libvirt-log-filters: '3:remote 4:event 3:util.json 3:util.object 3:util.dbus 3:util.netlink 3:node_device 1:rpc 3:access 1:*'
    spec:
{% if osvirt_machine_node_selector %}
      nodeSelector: {{ osvirt_machine_node_selector | to_json }}
{% endif %}
{% if osvirt_machine_tolerations %}
      tolerations: {{ osvirt_machine_tolerations | to_json }}
{% endif %}
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        devices:
          # Older operating systems like RHEL6 or Windows Server 2012 R2 or
          # older can't boot using modern virtio drivers. Windows may run into
          # the Blue Screen of Death (BSoD) due to the driver mismatch. These
          # older systems require virtio-transitional drivers that can be
          # enabled by setting useVirtioTransitional = true.
          # See also: https://redhat.atlassian.net/browse/MTV-1895
          useVirtioTransitional: false
{% if osvirt_machine_multithreaded_diskio %}
          # This allows the host-level IOthreads to be automatically mapped to multiple queues inside the
          # guest, so work is properly spread among vcpus as well. Queues are automatically set to the
          # total number of vcpus.
          # The VM must be provisioned with multiple vCPUs to benefit from multiple I/O queues.
          blockMultiQueue: true
{% endif %}
          disks:
          - disk:
              bus: virtio
            name: cloudinitdisk
          - bootOrder: 1
            disk:
              bus: virtio
            name: rootdisk
          interfaces:
{% if osvirt_machine_pod_network %}
          - masquerade: {}
            model: virtio
            name: default
{% endif %}
{% if osvirt_machine_multus_network_name | length > 0 %}
          - bridge: {}
            model: virtio
            name: net2
{% endif %}
          # Enable a side-car container that tails serial console logs. In OpenShift Web Console, this can be
          # enabled by the toggle button "Guest system log access". On the Linux terminal, to tail the serial
          # console logs available in the output of the side-car container, issue the command:
          # oc logs -f -c guest-console-log virt-launcher-example-t9th7
          logSerialConsole: true
          # Note that there is one queue provisioned per vCPU. The VM must be provisioned with multiple vCPUs
          # to benefit from multiqueue network I/O.
          # CPU hotplug doesn't work with multiqueue virtio-net at this time.
          networkInterfaceMultiqueue: false
          rng: {}
          # The Microsoft Windows 11 installer requires the presence of a TPM device, even though it doesn't
          # use this. Persistence is not required in this case however.
          # Some disk encryption software have optional/mandatory TPM support. For example, Bitlocker requires
          # a persistent TPM device.
          # See also https://kubevirt.io/user-guide/compute/persistent_tpm_and_uefi_state/
          tpm:
            persistent: false
{% if osvirt_machine_multithreaded_diskio %}
        # Allow VM disk I/O to be spread among multiple submission threads, which are also mapped to multiple
        # disk queues inside the VM. Allow VMs with many vcpus performing I/O to more efficiently utilize host
        # resources instead of bottlenecking behind a single submission thread.
        # SupplementalPool IOthreads are automatically shared across all VM disks, configure enough threads to
        # handle multiple disks if all are very active.
        # The requested supplementalPoolThreadCount value will be added to the total vcpu value, this
        # increases how many cpu requests are automatically configured for the VM (a virt-launcher pod).
        #
        # See also:
        # Feature Introduction: Multiple IOthreads for OpenShift Virtualization
        # https://developers.redhat.com/blog/2025/06/23/feature-introduction-multiple-iothreads-openshift-virtualization#
        ioThreadsPolicy: supplementalPool
        ioThreads:
          supplementalPoolThreadCount: 4
{% endif %}
        memory:
          guest: 2Gi
      evictionStrategy: {{ osvirt_machine_eviction_strategy }}
      hostname: {{ osvirt_machine_name }}
      networks:
{% if osvirt_machine_pod_network %}
      - name: default
        pod: {}
{% endif %}
{% if osvirt_machine_multus_network_name | length > 0 %}
      - name: net2
        multus:
          networkName: {{ osvirt_machine_multus_network_name }}
{% endif %}
      terminationGracePeriodSeconds: 180
      volumes:
      - cloudInitNoCloud:
          secretRef:
            name: {{ osvirt_machine_name }}-cloudinit
        name: cloudinitdisk
      - persistentVolumeClaim:
          claimName: {{ osvirt_machine_name }}-rootdisk
        name: rootdisk
